name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Start server
        env:
          HOST: 127.0.0.1
          PORT: 3100
        run: |
          node server.js &
          echo $! > server.pid
          sleep 5

      - name: Health check
        run: curl --fail http://127.0.0.1:3100/healthz

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
