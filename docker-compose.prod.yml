services:
  app:
    image: ${IMAGE_NAME:-ghcr.io/OWNER/REPO}:latest
    container_name: dcinside-viewer
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-3000}
      GALLERY_ID: ${GALLERY_ID:-dataprocessing}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
