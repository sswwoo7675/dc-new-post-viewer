<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>정보처리기사 갤러리 새 글 뷰어</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="feed-pane" aria-label="새 글 목록">
        <header class="topbar">
          <div>
            <h1>정보처리기사 갤러리</h1>
            <p id="statusText">새 글을 확인하는 중</p>
          </div>
          <button id="refreshButton" class="icon-button" type="button" title="새로고침" aria-label="새로고침">
            <span aria-hidden="true">↻</span>
          </button>
        </header>

        <div class="toolbar">
          <div class="toolbar-options">
            <label class="toggle">
              <input id="autoRefresh" type="checkbox" checked>
              <span>자동 갱신</span>
            </label>
            <label class="toggle">
              <input id="notificationToggle" type="checkbox">
              <span>Windows 알림</span>
            </label>
          </div>
          <span id="lastUpdated" class="muted">-</span>
        </div>

        <ol id="postList" class="post-list" aria-live="polite"></ol>
      </section>

      <section class="viewer-pane" aria-label="글과 댓글">
        <article id="postViewer" class="viewer-empty">
          <div class="empty-state">
            <h2>글을 선택하세요</h2>
            <p>왼쪽 목록에서 새 글을 고르면 본문과 댓글을 여기서 볼 수 있습니다.</p>
          </div>
        </article>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
